  function classifyLocal(text) {
    const lower = text.toLowerCase();
    const words = lower.split(/\s+/);

    // ── Detect project FIRST (so type & lane use the right project) ──
    let projectId = activeId;
    if (projects.length > 1) {
      let bestProjScore = 0; // only switch if there's a positive signal
      for (const p of projects) {
        if (p.id === activeId) continue; // skip current — it's the default
        let score = 0;
        const projWords = p.name.toLowerCase().split(/\s+/);
        for (const pw of projWords) {
          if (pw.length > 2 && lower.includes(pw)) score += 5;
        }
        for (const lane of p.lanes) {
          const laneWords = lane.title.toLowerCase().split(/\s+/);
          for (const lw of laneWords) {
            if (lw.length > 3 && lower.includes(lw)) score += 2;
          }
          for (const item of lane.items.slice(0, 10)) {
            const iw = item.title.toLowerCase().split(/\s+/);
            for (const w of iw) {
              if (w.length > 4 && lower.includes(w)) score += 1;
            }
          }
        }
        if (score > bestProjScore) { bestProjScore = score; projectId = p.id; }
      }
    }

    // Use the detected project for type & lane classification
    const proj = projects.find(p => p.id === projectId) || getProject();

    // ── Detect priority ──
    let priority = 'p2'; // default
    let prioScore = { p1: 0, p2: 0, p3: 0 };
    for (const [prio, keywords] of Object.entries(PRIORITY_SIGNALS)) {
      for (const kw of keywords) {
        if (lower.includes(kw)) prioScore[prio] += kw.length > 3 ? 2 : 1;
      }
    }
    const maxPrio = Math.max(prioScore.p1, prioScore.p2, prioScore.p3);
    if (maxPrio > 0) {
      if (prioScore.p1 === maxPrio) priority = 'p1';
      else if (prioScore.p3 === maxPrio && prioScore.p1 === 0) priority = 'p3';
      else priority = 'p2';
    }

    // ── Detect type (using target project's types) ──
    let type = null;
    let typeScores = {};
    const availTypes = proj ? (proj.types || ['eng', 'product', 'biz']) : ['eng', 'product', 'biz'];
    for (const t of availTypes) {
      typeScores[t] = 0;
      const signals = TYPE_SIGNALS[t] || [];
      for (const kw of signals) {
        if (lower.includes(kw)) typeScores[t] += kw.length > 3 ? 2 : 1;
      }
    }
    const maxType = Math.max(...Object.values(typeScores));
    if (maxType > 0) {
      type = Object.keys(typeScores).reduce((a, b) => typeScores[a] >= typeScores[b] ? a : b);
    } else {
      type = availTypes[0];
    }

    // ── Detect tags ──
    const tags = [];
    for (const [tag, keywords] of Object.entries(TAG_SIGNALS)) {
      for (const kw of keywords) {
        if (lower.includes(kw)) { tags.push(tag); break; }
      }
    }

    // ── Detect lane (using target project's lanes) ──
    let laneId = null;
    if (proj) {
      let bestLane = null;
      let bestScore = -1;
      for (const lane of proj.lanes) {
        if (lane.id === 'done') continue;
        let score = 0;
        const laneWords = lane.title.toLowerCase().split(/\s+/);
        for (const lw of laneWords) {
          if (lw.length > 2 && lower.includes(lw)) score += 3;
        }
        // Also check existing items for topic similarity
        for (const item of lane.items) {
          const itemWords = item.title.toLowerCase().split(/\s+/);
          for (const iw of itemWords) {
            if (iw.length > 3 && lower.includes(iw)) score += 1;
          }
          if (item.tags) {
            for (const t of item.tags) {
              if (tags.includes(t)) score += 2;
            }
          }
        }
        if (score > bestScore) { bestScore = score; bestLane = lane.id; }
      }
      laneId = bestLane || proj.lanes.filter(l => l.id !== 'done')[0]?.id;
    }

    // ── Split title and description ──
    let title = text;
    let desc = '';
    // If text has a sentence break, use first sentence as title
    const sentenceBreak = text.match(/^(.+?)[.!?]\s+(.+)$/s);
    if (sentenceBreak && sentenceBreak[1].length > 8) {
      title = sentenceBreak[1].trim();
      desc = sentenceBreak[2].trim();
    } else if (text.length > 80) {
      // If long, try to split at a natural break
      const comma = text.indexOf(',', 30);
      const dash = text.indexOf(' - ', 20);
      const colon = text.indexOf(':', 10);
      const breakPoint = Math.min(
        comma > 0 ? comma : 999,
        dash > 0 ? dash : 999,
        colon > 0 ? colon : 999
      );
      if (breakPoint < 999) {
        title = text.substring(0, breakPoint).trim();
        desc = text.substring(breakPoint + 1).trim();
        if (desc.startsWith('- ')) desc = desc.substring(2);
      }
    }

    // Calculate confidence
    const totalSignals = maxPrio + maxType + tags.length;
    const confidence = Math.min(95, 40 + totalSignals * 8);

    return {
      title,
      desc,
      priority,
      type,
      tags: [...new Set(tags)].slice(0, 5),
      laneId,
      projectId,
      confidence,
      method: 'local'
    };
  }

  // ── Claude API classification ──
  async function classifyWithClaude(text) {
    const apiKey = localStorage.getItem(API_KEY_STORE);
    if (!apiKey) return null;

    const proj = getProject();
    const lanes = proj ? proj.lanes.filter(l => l.id !== 'done').map(l => ({ id: l.id, title: l.title })) : [];
    const types = proj ? (proj.types || ['eng', 'product', 'biz']) : ['eng', 'product', 'biz'];
    const projectList = projects.map(p => ({ id: p.id, name: p.name }));
    const existingTags = getAllTags();

    const prompt = `You are an AI assistant that classifies backlog items for a project management tool.

Given this free-text input from the user, classify it into structured fields.

Available projects: ${JSON.stringify(projectList)}
Current project: "${proj ? proj.name : 'default'}"
Available lanes in current project: ${JSON.stringify(lanes)}
Available types: ${JSON.stringify(types)}
Existing tags: ${JSON.stringify(existingTags.slice(0, 20))}

User input: "${text}"

Respond ONLY with a JSON object (no markdown, no explanation):
{
  "title": "concise title for the backlog item",
  "desc": "expanded description with relevant details",
  "priority": "p1 or p2 or p3",
  "type": "one of the available types",
  "tags": ["tag1", "tag2"],
  "laneId": "id of the best matching lane",
  "projectId": "id of the best matching project",
  "confidence": 70-99
}`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) {
        console.warn('Claude API error:', resp.status);
        return null;
      }

      const data = await resp.json();
      const content = data.content[0].text.trim();
      // Parse JSON from response (handle possible markdown wrapping)
      const jsonStr = content.replace(/^```json?\s*/, '').replace(/\s*```$/, '');
      const result = JSON.parse(jsonStr);
      result.method = 'claude';

      // Validate fields
      if (!result.title) result.title = text;
      if (!['p1', 'p2', 'p3'].includes(result.priority)) result.priority = 'p2';
      if (!types.includes(result.type)) result.type = types[0];
      if (!Array.isArray(result.tags)) result.tags = [];
      if (!lanes.find(l => l.id === result.laneId)) result.laneId = lanes[0]?.id;
      if (!projects.find(p => p.id === result.projectId)) result.projectId = activeId;

      return result;
    } catch (e) {
      console.warn('Claude classification failed:', e);
      return null;
    }
  }

  async function classifyText(text) {
    // Show thinking indicator
    const suggestion = $('ai-suggestion');
    suggestion.style.display = 'none';
    const bar = $('quick-add-bar');
    let thinking = bar.querySelector('.ai-thinking');
    if (!thinking) {
      thinking = document.createElement('div');
      thinking.className = 'ai-thinking';
      thinking.innerHTML = '<div class="ai-thinking-dots"><span></span><span></span><span></span></div> Classifying…';
      bar.appendChild(thinking);
    }
    thinking.style.display = 'flex';

    // Try Claude API first, fallback to local
    let result = await classifyWithClaude(text);
    if (!result) {
      result = classifyLocal(text);
    }

    thinking.style.display = 'none';
    return result;
  }

  // ── Render AI suggestion ──
  function showSuggestion(result) {
    pendingClassification = result;
    const suggestion = $('ai-suggestion');
    const chips = $('ai-chips');
    const confidence = $('ai-confidence');

    const proj = result.projectId ? projects.find(p => p.id === result.projectId) : getProject();
    const lane = proj ? proj.lanes.find(l => l.id === result.laneId) : null;
    const typeLabel = (proj && proj.typeLabels && proj.typeLabels[result.type]) || result.type;

    const prioColors = { p1: 'tag-p1', p2: 'tag-p2', p3: 'tag-p3' };
    const prioLabels = { p1: 'P1 — now', p2: 'P2 — next', p3: 'P3 — later' };

    let html = '';

    // Title & desc preview
    if (result.title) {
      html += `<div class="ai-title-preview">${esc(result.title)}</div>`;
    }
    if (result.desc) {
      html += `<div class="ai-desc-preview">${esc(result.desc)}</div>`;
    }

    // Classification chips
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';

    if (projects.length > 1) {
      html += `<div class="ai-chip"><div class="ai-chip-label">Project</div><div class="ai-chip-value">${esc(proj ? proj.name : '?')}</div></div>`;
    }

    html += `<div class="ai-chip"><div class="ai-chip-label">Lane</div><div class="ai-chip-value">${esc(lane ? lane.title : '?')}</div></div>`;
    html += `<div class="ai-chip"><div class="ai-chip-label">Priority</div><div class="ai-chip-value"><span class="tag ${prioColors[result.priority] || ''}">${prioLabels[result.priority] || result.priority}</span></div></div>`;
    html += `<div class="ai-chip"><div class="ai-chip-label">Type</div><div class="ai-chip-value"><span class="tag tag-${result.type}">${esc(typeLabel)}</span></div></div>`;

    if (result.tags && result.tags.length) {
      html += `<div class="ai-chip"><div class="ai-chip-label">Tags</div><div class="ai-chip-value">${result.tags.map(t => `<span class="tag tag-custom">#${esc(t)}</span>`).join(' ')}</div></div>`;
    }

    html += '</div>';

    chips.innerHTML = html;
    confidence.textContent = result.method === 'claude' ? `Claude AI · ${result.confidence}%` : `Smart classify · ${result.confidence}%`;

    suggestion.style.display = 'block';
  }

  function hideSuggestion() {
    $('ai-suggestion').style.display = 'none';
    pendingClassification = null;
  }

  function acceptSuggestion() {
    if (!pendingClassification) return;
    const r = pendingClassification;

    // Switch project if needed
    if (r.projectId && r.projectId !== activeId) {
      activeId = r.projectId;
    }

    const p = getProject();
    if (!p) return;

    const newItem = {
      id: uid(),
      title: r.title,
      desc: r.desc || '',
      priority: r.priority,
      type: r.type,
      created: today(),
      due: '',
      tags: r.tags || [],
      voiceNote: null,
      voiceTranscript: ''
    };

    const lane = p.lanes.find(l => l.id === r.laneId);
    if (lane) {
      lane.items.push(newItem);
    } else {
      const firstLane = p.lanes.filter(l => l.id !== 'done')[0];
      if (firstLane) firstLane.items.push(newItem);
    }

    save();
    hideSuggestion();
    $('quick-add-input').value = '';
    render();
    toast('Item added to ' + (lane ? lane.title : 'backlog'), 'success');
  }

  // ── Quick add event handlers ──
  function setupQuickAdd() {
    const input = $('quick-add-input');
    let debounceTimer = null;

    input.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && input.value.trim()) {
        e.preventDefault();
        clearTimeout(debounceTimer);
        const text = input.value.trim();
        const result = await classifyText(text);
        showSuggestion(result);
      }
      if (e.key === 'Escape') {
        hideSuggestion();
        input.blur();
      }
    });

    // Accept / Edit / Dismiss buttons
    $('ai-accept').addEventListener('click', acceptSuggestion);
    $('ai-edit').addEventListener('click', editSuggestion);
    $('ai-dismiss').addEventListener('click', () => { hideSuggestion(); $('quick-add-input').value = ''; });

    // Voice input for quick add
    $('quick-add-voice-btn').addEventListener('click', () => {
      startQuickVoiceForInput(input);
    });

    // AI settings
    $('quick-add-settings-btn').addEventListener('click', openAISettings);
  }

  // Voice input that fills the quick-add input
  async function startQuickVoiceForInput(input) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { toast('Speech recognition not supported in this browser', 'error'); return; }

    const btn = $('quick-add-voice-btn');
    if (btn.classList.contains('recording')) {
      // Stop
      if (speechRecognition) { speechRecognition.stop(); speechRecognition = null; }
      btn.classList.remove('recording');
      return;
    }

    btn.classList.add('recording');
    speechRecognition = new SpeechRecognition();
    speechRecognition.continuous = false;
    speechRecognition.interimResults = true;
    speechRecognition.lang = 'en-US';

    speechRecognition.onresult = e => {
      let transcript = '';
      for (let i = 0; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      input.value = transcript;
    };

    speechRecognition.onend = async () => {
      btn.classList.remove('recording');
      speechRecognition = null;
      if (input.value.trim()) {
        const result = await classifyText(input.value.trim());
        showSuggestion(result);
      }
    };

    speechRecognition.onerror = () => {
      btn.classList.remove('recording');
      speechRecognition = null;
      toast('Speech recognition failed', 'error');
    };

    try {
      speechRecognition.start();
    } catch (err) {
      btn.classList.remove('recording');
      toast('Microphone not available', 'error');
    }
  }

  // ═════════════════════════════════════════════════════
  //  INBOX SYNC (Teams → Cortex pipeline)

  const INBOX_INTERVAL = 60000; // check every 60s
  const INBOX_BASE_KEY = 'backlog_inbox_url';

  function getInboxUrl() {
    // Auto-detect: if served from a server, use same origin; otherwise use stored URL
    if (location.protocol === 'https:' || location.protocol === 'http:') {
      return location.origin + '/api/backlog/inbox';
    }
    return localStorage.getItem(INBOX_BASE_KEY) || '';
  }

  async function syncInbox() {
    const url = getInboxUrl();
    if (!url) return;

    try {
      const resp = await fetch(url + '?ack=true', {
        headers: { 'Content-Type': 'application/json' }
      });
      if (!resp.ok) return;

      const data = await resp.json();
      if (!data.items || data.items.length === 0) return;

      let added = 0;
      const routed = { /* projectId → count */ };

      for (const item of data.items) {
        if (!(item.title || '').trim()) continue;

        // ── Run AI classifier to determine project, lane, priority, type, tags ──
        const classText = item.title + (item.description ? '. ' + item.description : '');
        const c = classifyLocal(classText); // use local (instant) for bulk sync

        // ── Build meeting tag ──
        const meetingTag = item.meeting_subject
          ? item.meeting_subject.replace(/[^\w\s-]/g, '').trim().substring(0, 40)
          : null;

        // ── Merge tags: classifier tags + webhook tags + meeting tag ──
        const allTags = [...new Set([
          ...(c.tags || []),
          ...(item.tags || []),
          ...(meetingTag ? [meetingTag] : []),
          ...(item.source ? [item.source] : []),
        ])].slice(0, 8);

        // ── Resolve target project (classifier may route to a different project) ──
        const targetProjectId = c.projectId || activeId;
        const targetProject = projects.find(p => p.id === targetProjectId) || getProject();
        if (!targetProject) continue;

        // ── Resolve target lane within that project ──
        // Re-run lane matching against the target project if classifier picked a different one
        let targetLaneId = c.laneId;
        if (c.projectId && c.projectId !== activeId) {
          // Classifier picked a different project — find best lane in THAT project
          let bestScore = -1;
          const lower = classText.toLowerCase();
          for (const lane of targetProject.lanes) {
            if (lane.id === 'done') continue;
            let score = 0;
            for (const lw of lane.title.toLowerCase().split(/\s+/)) {
              if (lw.length > 2 && lower.includes(lw)) score += 3;
            }
            for (const li of lane.items.slice(0, 10)) {
              for (const iw of li.title.toLowerCase().split(/\s+/)) {
                if (iw.length > 4 && lower.includes(iw)) score += 1;
              }
            }
            if (score > bestScore) { bestScore = score; targetLaneId = lane.id; }
          }
        }

        const targetLane = targetProject.lanes.find(l => l.id === targetLaneId)
          || targetProject.lanes.find(l => l.id !== 'done')
          || targetProject.lanes[0];
        if (!targetLane) continue;

        // ── Use classifier's priority, but let webhook override if explicitly set ──
        const priority = (item.priority && ['p1', 'p2', 'p3'].includes(item.priority))
          ? item.priority
          : c.priority;

        // ── Build description with meeting context ──
        let desc = c.desc || item.description || '';
        if (item.meeting_subject) {
          desc = (desc ? desc + '\n\n' : '') + '📋 From meeting: ' + item.meeting_subject;
        }

        // ── Create the item ──
        const newItem = {
          id: item.id || ('inbox-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6)),
          title: c.title || item.title,
          desc,
          priority,
          type: c.type || (targetProject.types ? targetProject.types[0] : 'eng'),
          date: new Date().toISOString().slice(0, 10),
          due: '',
          tags: allTags,
          voice: null,
        };

        targetLane.items.unshift(newItem);
        added++;
        routed[targetProject.name] = (routed[targetProject.name] || 0) + 1;
      }

      if (added > 0) {
        save();
        render();

        // Build informative toast
        const routeInfo = Object.entries(routed)
          .map(([name, count]) => `${count} → ${name}`)
          .join(', ');
        toast(`📥 ${added} item${added > 1 ? 's' : ''} synced: ${routeInfo}`, 'success');
      }
    } catch (e) {
      // Silently fail — inbox sync is best-effort
      console.debug('Inbox sync failed:', e.message);
    }
  }

  function startInboxSync() {
    // Initial sync after a short delay (let the app render first)
    setTimeout(syncInbox, 2000);
    // Periodic sync
    setInterval(syncInbox, INBOX_INTERVAL);
  }

  async function _loadMeetingsFromBackend() {
    const base = _getApiBase();
    if (!base || _backendAvailable === false) return;
    try {
      const resp = await fetch(base + '/api/meetings');
      if (resp.ok) {
        const data = await resp.json();
        const backend = data.meetings || [];
        if (backend.length && !meetings.length) {
          meetings = backend;
          localStorage.setItem(MEETINGS_STORAGE_KEY, JSON.stringify(meetings));
          if (currentView === 'meetings') renderMeetingsView();
        }
      }
    } catch (e) { /* silent */ }
  }

  function saveMeetings() {
    try { localStorage.setItem(MEETINGS_STORAGE_KEY, JSON.stringify(meetings)); } catch (e) { /* full */ }
    clearTimeout(_meetingSyncTimer);
    _meetingSyncTimer = setTimeout(_syncMeetingsToBackend, 2000);
  }

  async function _syncMeetingsToBackend() {
    const base = _getApiBase();
    if (!base || _backendAvailable === false) return;
    try {
      await fetch(base + '/api/meetings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meetings }),
      });
    } catch (e) { /* silent */ }
  }

  // ── View switching ──

  function switchView(view) {
    currentView = view;
    const boardEls = [document.querySelector('.workspace-bar'), document.querySelector('.project-bar'), $('quick-add-bar'), document.querySelector('.main')];
    const meetingsEl = $('meetings-view');

    boardEls.forEach(el => { if (el) el.style.display = view === 'board' ? '' : 'none'; });
    meetingsEl.classList.toggle('active', view === 'meetings');

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });

    if (view === 'meetings') renderMeetingsView();

  function setupViewSwitcher() {
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

  // ── Meetings list rendering ──

  function renderMeetingsView() {
    const toolbar = $('meetings-toolbar-container');
    const stats = $('meetings-stats-container');
    const list = $('meetings-list-container');

    const totalItems = meetings.reduce((s, m) => s + (m.actionItemIds || []).length, 0);
    const thisWeek = meetings.filter(m => {
      const d = new Date(m.created || m.date);
      const now = new Date();
      return (now - d) < 7 * 24 * 60 * 60 * 1000;
    }).length;

    toolbar.innerHTML = `
      <div class="meetings-toolbar">
        <button class="toolbar-btn primary" id="btn-new-meeting">+ New Meeting</button>
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="meeting-search" placeholder="Search meetings…" value="${esc(meetingSearch)}" autocomplete="off" style="width:100%;padding:7px 10px 7px 32px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text);font-size:13px;font-family:var(--font);outline:none;" />
        </div>
      </div>`;

    stats.innerHTML = `
      <div class="meetings-stats">
        <div class="meetings-stat"><strong>${meetings.length}</strong> meetings</div>
        <div class="meetings-stat"><strong>${totalItems}</strong> action items extracted</div>
        <div class="meetings-stat"><strong>${thisWeek}</strong> this week</div>
      </div>`;

    // Filter by search
    let filtered = meetings;
    if (meetingSearch) {
      const q = meetingSearch.toLowerCase();
      filtered = meetings.filter(m =>
        (m.title || '').toLowerCase().includes(q) ||
        (m.transcript || '').toLowerCase().includes(q) ||
        (m.attendees || []).some(a => a.toLowerCase().includes(q))
      );
    }

    // Sort by date descending
    filtered = [...filtered].sort((a, b) => new Date(b.date || b.created) - new Date(a.date || a.created));

    if (!filtered.length) {
      list.innerHTML = `
        <div class="meetings-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <h3>${meetingSearch ? 'No meetings match your search' : 'No meetings yet'}</h3>
          <p>${meetingSearch ? 'Try a different search term' : 'Paste a transcript from Teams, Zoom, or Otter to get started'}</p>
        </div>`;
    } else {
      list.innerHTML = `<div class="meetings-grid">${filtered.map(m => renderMeetingCard(m)).join('')}</div>`;
    }

    // Wire events
    $('btn-new-meeting').addEventListener('click', openNewMeetingModal);
    const searchInput = $('meeting-search');
    searchInput.addEventListener('input', e => { meetingSearch = e.target.value; renderMeetingsView(); });
    list.querySelectorAll('.meeting-card').forEach(card => {
      card.addEventListener('click', () => {
        const mtg = meetings.find(m => m.id === card.dataset.id);
        if (mtg) openMeetingDetailModal(mtg);
      });
    });
  }

  function renderMeetingCard(m) {
    const date = m.date ? new Date(m.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const attendeeCount = (m.attendees || []).length;
    const itemCount = (m.actionItemIds || []).length;
    const summaryText = Array.isArray(m.summary) && m.summary.length ? m.summary[0] : '';
    return `
      <div class="meeting-card" data-id="${m.id}">
        <div class="meeting-card-head">
          <div class="meeting-card-title">${esc(m.title || 'Untitled')}</div>
          <div class="meeting-card-date">${esc(date)}</div>

        <div class="meeting-card-meta">
          ${attendeeCount ? `<span class="tag tag-custom">${attendeeCount} attendee${attendeeCount !== 1 ? 's' : ''}</span>` : ''}
          ${itemCount ? `<span class="tag tag-custom" style="background:rgba(139,92,246,0.12);color:var(--purple)">${itemCount} action item${itemCount !== 1 ? 's' : ''}</span>` : ''}
          <span class="meeting-status ${m.status || 'pending'}">${esc(m.status || 'pending')}</span>

  // ── Extraction ──

  async function runExtraction(meeting) {
    const spinner = $('md-extraction-spinner');
    const panel = $('md-extraction-panel');
    const extractBtn = $('md-extract');

    // Update transcript from textarea in case user edited it
    meeting.transcript = ($('md-transcript') || {}).value || meeting.transcript;

    if (extractBtn) extractBtn.style.display = 'none';
    spinner.style.display = '';
    panel.innerHTML = '';

    try {
      const base = _getApiBase();
      // Save latest transcript to backend first
      meeting.status = 'processing';
      saveMeetings();

      const resp = await fetch(base + `/api/meetings/${meeting.id}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || 'Extraction failed');
      }

      const extraction = await resp.json();
      meeting.status = 'processed';
      meeting.summary = extraction.summary || [];
      meeting.decisions = extraction.decisions || [];
      meeting.openQuestions = extraction.openQuestions || [];
      meeting.extractionRaw = extraction;
      saveMeetings();

      spinner.style.display = 'none';
      panel.innerHTML = renderExtractionResults(meeting);
      wireExtractionActions(meeting);

      // Update status badge in modal header
      const statusBadge = $('meeting-detail-modal').querySelector('.meeting-status');
      if (statusBadge) { statusBadge.className = 'meeting-status processed'; statusBadge.textContent = 'processed'; }

      toast('Action items extracted successfully!', 'success');
    } catch (e) {
      spinner.style.display = 'none';
      meeting.status = 'failed';
      saveMeetings();
      panel.innerHTML = `<div style="color:var(--red);padding:12px;font-size:13px;">Extraction failed: ${esc(e.message)}</div>`;
      if (extractBtn) extractBtn.style.display = '';
      toast('Extraction failed: ' + e.message, 'error');
    }
  }

  function renderExtractionResults(meeting) {
    const ext = meeting.extractionRaw || {};
    const summary = ext.summary || meeting.summary || [];
    const decisions = ext.decisions || meeting.decisions || [];
    const openQs = ext.openQuestions || meeting.openQuestions || [];
    const items = ext.actionItems || [];
    const alreadyAdded = new Set(meeting.actionItemIds || []);

    let html = '<div class="extraction-panel">';
    html += '<div class="extraction-header"><h3>Extraction Results</h3></div>';

    if (summary.length) {
      html += `<div class="extraction-section"><h4>Summary</h4><ul>${summary.map(s => `<li>${esc(s)}</li>`).join('')}</ul></div>`;
    }
    if (decisions.length) {
      html += `<div class="extraction-section"><h4>Decisions</h4><ul>${decisions.map(d => `<li>${esc(d)}</li>`).join('')}</ul></div>`;
    }
    if (openQs.length) {
      html += `<div class="extraction-section"><h4>Open Questions</h4><ul>${openQs.map(q => `<li>${esc(q)}</li>`).join('')}</ul></div>`;
    }

    if (items.length) {
      html += `<div class="extraction-section"><h4>Action Items</h4>`;
      items.forEach((item, i) => {
        const checked = !alreadyAdded.size ? 'checked' : '';
        html += `
          <div class="extraction-item">
            <input type="checkbox" data-idx="${i}" ${checked} />
            <div class="extraction-item-body">
              <div class="extraction-item-title">${esc(item.title)}</div>
              ${item.desc ? `<div class="extraction-item-desc">${esc(item.desc)}</div>` : ''}
              <div class="extraction-item-meta">
                ${item.assignee ? `<span class="tag tag-custom">${esc(item.assignee)}</span>` : ''}
                ${item.priority ? `<span class="tag tag-${item.priority}">${item.priority}</span>` : ''}
                ${item.dueHint ? `<span class="tag tag-custom">${esc(item.dueHint)}</span>` : ''}
              </div>
            </div>
          </div>`;
      });
      html += `</div>`;

      if (!alreadyAdded.size) {
        html += `<div style="text-align:right;margin-top:10px;">
          <button class="toolbar-btn primary" id="md-add-to-backlog">Add Selected to Backlog</button>
        </div>`;
      } else {
        html += `<div style="padding:8px 0;font-size:12px;color:var(--green);">Action items already added to backlog.</div>`;
      }
    } else if (meeting.status === 'processed') {
      html += `<div style="padding:8px 0;font-size:13px;color:var(--muted);">No action items found in this transcript.</div>`;
    }

    html += '</div>';
    return html;
  }

  function wireExtractionActions(meeting) {
    const btn = $('md-add-to-backlog');
    if (!btn) return;
    btn.addEventListener('click', () => {
      const ext = meeting.extractionRaw || {};
      const items = ext.actionItems || [];
      const panel = $('md-extraction-panel');
      const checkboxes = panel.querySelectorAll('input[type="checkbox"]');
      const addedIds = [];

      const proj = projects.find(p => p.id === activeId) || projects[0];
      if (!proj) { toast('No project found', 'error'); return; }
      const defaultLane = proj.lanes.find(l => l.id === 'backlog' || l.id === 'to-do') || proj.lanes[0];

      checkboxes.forEach(cb => {
        if (!cb.checked) return;
        const idx = parseInt(cb.dataset.idx);
        const item = items[idx];
        if (!item) return;

        const newItem = {
          id: uid(),
          title: item.title,
          desc: item.desc || '',
          priority: item.priority || 'p3',
          type: item.type || (proj.types ? proj.types[0] : 'eng'),
          tags: item.tags || [],
          created: today(),
          due: item.dueHint || '',
          voiceNote: null,
          voiceTranscript: '',
          meetingId: meeting.id,
          meetingTitle: meeting.title,
          laneId: defaultLane.id,
          laneTitle: defaultLane.title,
        };

        const lane = proj.lanes.find(l => l.id === (item.laneId || defaultLane.id)) || defaultLane;
        lane.items.push(newItem);
        addedIds.push(newItem.id);
      });

      if (addedIds.length) {
        meeting.actionItemIds = [...(meeting.actionItemIds || []), ...addedIds];
        save();
        saveMeetings();
        render();
        toast(`${addedIds.length} action item${addedIds.length > 1 ? 's' : ''} added to backlog`, 'success');
        // Re-render extraction panel to show "already added"
        panel.innerHTML = renderExtractionResults(meeting);
        renderMeetingsView();
      } else {
        toast('No items selected', 'error');
      }
    });
  }

  // ── Attendees chip input helper ──

  function setupAttendeesInput(inputId, containerId, attendees) {
    const input = $(inputId);
    const container = $(containerId);

    function renderChips() {
      container.querySelectorAll('.attendee-chip').forEach(c => c.remove());
      attendees.forEach((name, i) => {
        const chip = document.createElement('span');
        chip.className = 'attendee-chip';
        chip.innerHTML = `${esc(name)} <span class="remove" data-idx="${i}">&times;</span>`;
        container.insertBefore(chip, input);
      });
      container.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          attendees.splice(parseInt(btn.dataset.idx), 1);
          renderChips();
        });
      });
    }

    input.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
        e.preventDefault();
        attendees.push(input.value.trim().replace(',', ''));
        input.value = '';
        renderChips();
      }
      if (e.key === 'Backspace' && !input.value && attendees.length) {
        attendees.pop();
        renderChips();
      }
    });

    container.addEventListener('click', () => input.focus());
  }

  // ── File upload helpers ──

  function setupUploadZone(zoneId, textareaId) {
    const zone = $(zoneId);
    const textarea = $(textareaId);

    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) readTranscriptFile(file, textarea);
    });
  }

  function setupUploadClick(zoneId, textareaId) {
    const zone = $(zoneId);
    const textarea = $(textareaId);
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.txt,.md,.vtt,.srt';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) readTranscriptFile(fileInput.files[0], textarea);
      fileInput.value = '';
    });
  }

  function readTranscriptFile(file, textarea) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['txt', 'md', 'vtt', 'srt'].includes(ext)) {
      toast('Unsupported file type. Use .txt, .md, .vtt, or .srt', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      let text = e.target.result;
      // Strip VTT/SRT formatting
      if (ext === 'vtt') {
        text = text.replace(/^WEBVTT[\s\S]*?\n\n/, '');
        text = text.replace(/\d{2}:\d{2}[:.]\d{3}\s*-->\s*\d{2}:\d{2}[:.]\d{3}[^\n]*/g, '');
        text = text.replace(/\n{3,}/g, '\n\n').trim();
      } else if (ext === 'srt') {
        text = text.replace(/^\d+\s*\n/gm, '');
        text = text.replace(/\d{2}:\d{2}:\d{2},\d{3}\s*-->\s*\d{2}:\d{2}:\d{2},\d{3}[^\n]*/g, '');
        text = text.replace(/\n{3,}/g, '\n\n').trim();
      }
      textarea.value = text;
      toast(`Loaded ${file.name} (${text.split(/\s+/).length} words)`);
    };
    reader.readAsText(file);
  }

    const meeting = meetings.find(m => m.id === meetingId);
    if (!meeting) return;
    switchView('meetings');

  document.addEventListener('keydown', e => {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;
    if (document.querySelector('.modal-overlay.open')) return;
    if (e.key === 'q') { e.preventDefault(); $('quick-add-input').focus(); }
    if (e.key === 'm' || e.key === 'M') { e.preventDefault(); switchView(currentView === 'meetings' ? 'board' : 'meetings'); }
  });

})();

</script>
</body>
</html>
