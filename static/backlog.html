<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Cortex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --bg-raised: #111827;
  --card-bg: #1a2235;
  --card-bg-hover: #1e2940;
  --input-bg: #0f172a;
  --border: #1e293b;
  --border-hover: #334155;
  --border-focus: #E8440A;
  --accent: #8b5cf6;
  --accent-hover: #7c3aed;
  --accent-muted: rgba(139, 92, 246, 0.10);
  --accent-border: rgba(139, 92, 246, 0.35);
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f59e0b;
  --pink: #ec4899;
  --text: #f0f0f8;
  --text-secondary: #cbd5e1;
  --muted: #94a3b8;
  --subtle: #64748b;
  --dim: #475569;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --font: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
  --transition: 0.15s ease;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--subtle); }

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 16px;
}

.topbar-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #8b5cf6, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.version { color: var(--dim); font-size: 11px; font-family: var(--font-mono); }
.sync-status { font-size: 10px; color: var(--dim); font-family: var(--font-mono); transition: opacity 0.3s; }
.sync-status.saving { color: var(--yellow); }
.sync-status.saved { color: var(--green); }

.topbar-center { flex: 1; max-width: 420px; }

.search-box {
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 10px;
  color: var(--subtle);
  pointer-events: none;
}
.search-box input {
  width: 100%;
  padding: 7px 12px 7px 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition);
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--dim); }

.topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
}
.icon-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); border-color: var(--border-hover); }
.icon-btn.active { background: var(--accent-muted); border-color: var(--accent-border); color: var(--accent); }

/* ── Project bar ── */
/* ── Workspace selector ── */
.workspace-bar {
  display: flex;
  align-items: center;
  padding: 6px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 6px;
}
.workspace-tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; scrollbar-width: none; }
.workspace-tabs::-webkit-scrollbar { display: none; }
.workspace-tab {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 4px;
}
.workspace-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
.workspace-tab.active { color: var(--accent); background: var(--accent-muted); border-color: var(--accent-border); }
.workspace-tab .ws-count { font-size: 10px; opacity: 0.6; }
.workspace-add-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border); border-radius: 50%;
  color: var(--muted); cursor: pointer; font-size: 14px; flex-shrink: 0;
  transition: all var(--transition);
}
.workspace-add-btn:hover { border-color: var(--accent); color: var(--accent); }

.project-bar {
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.project-bar::-webkit-scrollbar { display: none; }

.project-tabs { display: flex; align-items: stretch; gap: 0; }

.project-tab {
  position: relative;
  padding: 10px 16px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.project-tab:hover { color: var(--text-secondary); }
.project-tab.active { color: var(--text); }
.project-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 8px;
  right: 8px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}
.project-tab .tab-count {
  font-size: 10px;
  background: rgba(255,255,255,0.06);
  padding: 1px 6px;
  border-radius: 99px;
  font-variant-numeric: tabular-nums;
}
.project-tab.active .tab-count { background: var(--accent-muted); color: var(--accent); }

.project-tab .tab-actions {
  display: none;
  gap: 2px;
  margin-left: 4px;
}
.project-tab:hover .tab-actions,
.project-tab.active .tab-actions { display: flex; }

.tab-action-btn {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  border: none;
  background: transparent;
  color: var(--subtle);
  cursor: pointer;
  font-size: 10px;
  transition: all var(--transition);
}
.tab-action-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.tab-action-btn.delete:hover { color: var(--red); }

.project-add-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-xs);
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  margin-left: 6px;
  transition: all var(--transition);
}
.project-add-btn:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-muted); }

/* ── Main ── */
.main { padding: 20px 24px 40px; max-width: 1400px; margin: 0 auto; }

/* ── Stats row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  transition: border-color var(--transition);
}
.stat-card:hover { border-color: var(--border-hover); }
.stat-label {
  font-size: 10px;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.stat-val {
  font-size: 22px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.stat-val.c-p1 { color: var(--red); }
.stat-val.c-p2 { color: var(--orange); }
.stat-val.c-p3 { color: var(--green); }
.stat-val.c-done { color: var(--dim); }
.stat-val.c-total { color: #e5e5e5; }
.stat-val.c-overdue { color: var(--red); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { border-color: rgba(255,255,255,0.15); color: #ccc; }
.filter-btn.active { background: var(--accent-muted); border-color: var(--accent-border); color: var(--accent); }

.toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.toolbar .spacer { flex: 1; }

.sort-select {
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  outline: none;
}
.sort-select option { background: var(--bg-raised); }

.toolbar-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: #ccc;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.toolbar-btn:hover { border-color: rgba(255,255,255,0.15); }
.toolbar-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.toolbar-btn.primary:hover { background: var(--accent-hover); }
.toolbar-btn.voice {
  display: flex;
  align-items: center;
  gap: 5px;
}
.toolbar-btn.voice svg { flex-shrink: 0; }

/* ── Lanes ── */
.lanes { }

.lane {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color var(--transition);
}
.lane.drag-over { border-color: var(--accent-border); background: var(--accent-muted); }

.lane-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.lane-head:hover { background: rgba(255,255,255,0.02); }

.lane-arrow {
  font-size: 9px;
  color: var(--dim);
  transition: transform 0.2s ease;
  width: 14px;
  text-align: center;
}
.lane-arrow.open { transform: rotate(90deg); }

.lane-title { font-size: 13px; font-weight: 600; flex: 1; }

.lane-count {
  font-size: 10px;
  color: var(--dim);
  background: rgba(255,255,255,0.04);
  padding: 1px 8px;
  border-radius: 99px;
  font-variant-numeric: tabular-nums;
}

.lane-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}
.lane-head:hover .lane-actions { opacity: 1; }

.lane-action-btn {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--subtle);
  cursor: pointer;
  font-size: 11px;
}
.lane-action-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.lane-body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
  padding: 4px 10px 12px;
}
.lane-body.collapsed { display: none; }

/* ── Cards ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  transition: all var(--transition);
  position: relative;
  cursor: pointer;
}
.card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-1px); background: var(--card-bg-hover); }
.card.dragging { opacity: 0.4; transform: scale(0.98); }
.card.drag-target { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

.card-title { font-size: 13px; font-weight: 500; line-height: 1.4; flex: 1; }

.card-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
  flex-shrink: 0;
}
.card:hover .card-actions { opacity: 1; }

.card-btn {
  font-family: var(--font);
  font-size: 10px;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--subtle);
  cursor: pointer;
  transition: all var(--transition);
}
.card-btn:hover { background: rgba(255,255,255,0.06); color: #ccc; }
.card-btn.delete:hover { color: var(--red); }

.card-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  margin-top: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; align-items: center; }

.tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
}
.tag-p1 { background: rgba(239,68,68,0.12); color: #f87171; }
.tag-p2 { background: rgba(245,158,11,0.12); color: #fbbf24; }
.tag-p3 { background: rgba(16,185,129,0.12); color: #34d399; }
.tag-eng { background: rgba(59,130,246,0.12); color: #60a5fa; }
.tag-product { background: rgba(139,92,246,0.12); color: #a78bfa; }
.tag-biz { background: rgba(236,72,153,0.12); color: #f472b6; }
.tag-done { background: rgba(255,255,255,0.04); color: #555; }
.tag-custom { background: rgba(255,255,255,0.06); color: var(--muted); }

.card-due {
  font-size: 10px;
  color: var(--subtle);
  display: flex;
  align-items: center;
  gap: 3px;
}
.card-due.overdue { color: var(--red); }
.card-due.soon { color: var(--orange); }

.card-voice-badge {
  font-size: 10px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}
.card-voice-badge:hover { text-decoration: underline; }

/* Done lane */
.lane-done .card { opacity: 0.5; }
.lane-done .card-title { text-decoration: line-through; color: var(--subtle); }

/* ── Modals ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg-raised);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  width: 520px;
  max-width: 92vw;
  max-height: 88vh;
  overflow-y: auto;
  padding: 24px;
  box-shadow: var(--shadow-lg);
  transform: translateY(8px);
  transition: transform 0.2s ease;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-sm { width: 400px; }

.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 18px;
}

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 5px;
}
.field input, .field textarea, .field select {
  font-family: var(--font);
  font-size: 13px;
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.field select option { background: var(--bg-raised); }

.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }

.tag-select { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-option {
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--subtle);
  cursor: pointer;
  transition: all 0.12s;
}
.tag-option.sel { border-color: var(--accent-border); color: var(--accent); background: var(--accent-muted); }

.tags-input-container {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--bg);
  min-height: 36px;
  cursor: text;
  transition: border-color var(--transition);
}
.tags-input-container:focus-within { border-color: var(--accent); }
.tags-input-container .tag-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  background: rgba(255,255,255,0.06);
  color: var(--muted);
}
.tags-input-container .tag-chip .remove {
  cursor: pointer;
  font-size: 12px;
  color: var(--subtle);
  line-height: 1;
}
.tags-input-container .tag-chip .remove:hover { color: var(--red); }
.tags-input-container input {
  flex: 1;
  min-width: 80px;
  border: none;
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 2px 0;
  outline: none;
}

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-actions .toolbar-btn { padding: 7px 18px; }

/* Voice note section in modal */
.voice-section {
  margin-top: 8px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.02);
}
.voice-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.voice-section-label { font-size: 11px; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.05em; }
.voice-record-btn {
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition);
}
.voice-record-btn:hover { border-color: var(--accent-border); color: var(--accent); }
.voice-record-btn.recording { border-color: var(--red); color: var(--red); animation: pulse-glow 1.5s infinite; }
.voice-transcription {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  font-style: italic;
}
.voice-audio { margin-top: 8px; width: 100%; height: 32px; }
.voice-audio::-webkit-media-controls-panel { background: var(--bg); }

/* ── Timeline panel ── */
.timeline-panel {
  background: var(--bg-raised);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  width: 90vw;
  max-width: 1200px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
  box-shadow: var(--shadow-lg);
}
.timeline-panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

.timeline-grid {
  display: grid;
  gap: 2px;
  position: relative;
}
.timeline-header {
  display: grid;
  gap: 2px;
  font-size: 10px;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  position: sticky;
  top: 0;
  background: var(--bg-raised);
  z-index: 2;
}
.timeline-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.timeline-item-label {
  font-size: 12px;
  width: 220px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.timeline-bar-container { flex: 1; position: relative; height: 22px; }
.timeline-bar {
  position: absolute;
  height: 18px;
  border-radius: 4px;
  top: 2px;
  font-size: 10px;
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: #fff;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 4px;
}
.timeline-bar.p1 { background: var(--red); }
.timeline-bar.p2 { background: var(--orange); }
.timeline-bar.p3 { background: var(--green); }
.timeline-bar.done { background: var(--dim); opacity: 0.5; }
.timeline-today {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent);
  z-index: 1;
}
.timeline-today::before {
  content: 'Today';
  position: absolute;
  top: -18px;
  left: -16px;
  font-size: 9px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.timeline-empty {
  text-align: center;
  padding: 40px;
  color: var(--subtle);
  font-size: 13px;
}

/* ── Voice indicator ── */
.voice-indicator {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-raised);
  border: 1px solid var(--red);
  border-radius: 99px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow-lg);
  transition: transform 0.3s ease;
  z-index: 2000;
}
.voice-indicator.active { transform: translateX(-50%) translateY(0); }

.voice-pulse {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse-glow 1.5s infinite;
}

.voice-stop {
  font-family: var(--font);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--red);
  background: rgba(239,68,68,0.12);
  color: var(--red);
  cursor: pointer;
}
.voice-stop:hover { background: rgba(239,68,68,0.2); }

@keyframes pulse-glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}

/* ── Toast ── */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 3000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow-md);
  animation: toast-in 0.3s ease;
  max-width: 320px;
}
.toast.info { background: var(--bg-raised); border: 1px solid var(--border); }
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--subtle);
}
.empty-state h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
.empty-state p { font-size: 13px; margin-bottom: 16px; }

/* ── Quick add bar ── */
.quick-add-bar {
  padding: 12px 24px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  position: relative;
}
.quick-add-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
}
.quick-add-icon {
  color: var(--accent);
  flex-shrink: 0;
}
.quick-add-bar input {
  flex: 1;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.quick-add-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-muted);
}
.quick-add-bar input::placeholder { color: var(--dim); }

.quick-add-actions { display: flex; gap: 4px; flex-shrink: 0; }
.quick-add-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
}
.quick-add-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); border-color: var(--border-hover); }
.quick-add-btn.recording { border-color: var(--red); color: var(--red); animation: pulse-glow 1.5s infinite; }

/* AI suggestion panel */
.ai-suggestion {
  margin-top: 10px;
  padding: 14px 16px;
  background: var(--card-bg);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-sm);
  animation: suggestion-in 0.25s ease;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
}
@keyframes suggestion-in {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.ai-suggestion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.ai-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 5px;
}
.ai-confidence {
  font-size: 10px;
  color: var(--subtle);
  font-family: var(--font-mono);
}
.ai-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.ai-chip {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 6px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  min-width: 100px;
}
.ai-chip-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--subtle);
}
.ai-chip-value {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}
.ai-chip-value .tag { font-size: 11px; }
.ai-chip.editable { cursor: pointer; transition: border-color var(--transition); }
.ai-chip.editable:hover { border-color: var(--accent-border); }

.ai-title-preview {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--text);
}
.ai-desc-preview {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.5;
}

.ai-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.ai-thinking {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--muted);
  max-width: 1400px;
  margin: 10px auto 0;
}
.ai-thinking-dots {
  display: flex;
  gap: 3px;
}
.ai-thinking-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: dot-bounce 1.2s infinite;
}
.ai-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.ai-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* ── Touch drag clone ── */
.touch-drag-clone {
  border: 2px solid var(--accent) !important;
  border-radius: var(--radius-sm);
  background: var(--card-bg) !important;
}

/* ── Responsive: Tablet ── */
@media (max-width: 1024px) {
  .lane-body { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .timeline-content { padding: 16px; }
}

/* ── Responsive: Mobile (≤ 768px) ── */
@media (max-width: 768px) {
  /* Topbar: compact layout */
  .topbar { padding: 10px 14px; gap: 10px; }
  .topbar-left .logo { font-size: 16px; }
  .topbar-left .version { display: none; }
  .topbar-center { display: none; }

  /* Project bar: horizontal scroll with smaller tabs */
  .project-bar { padding: 0 12px; }
  .project-tab { padding: 8px 12px; font-size: 11px; }
  .project-tab .tab-actions { display: none !important; }
  .project-add-btn { width: 24px; height: 24px; font-size: 14px; }

  /* Quick add bar */
  .quick-add-bar { padding: 10px 14px; }
  .quick-add-inner input { font-size: 14px; /* prevents iOS zoom */ }
  .ai-suggestion { padding: 12px; }
  .ai-chips { gap: 6px; }
  .ai-chip { padding: 5px 10px; }
  .ai-actions { flex-wrap: wrap; gap: 6px; }

  /* Main content */
  .main { padding: 12px 10px 80px; }  /* extra bottom padding for mobile reach */

  /* Stats row: 2-column grid on mobile */
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-card { padding: 8px 12px; }
  .stat-label { font-size: 9px; }
  .stat-val { font-size: 18px; }

  /* Toolbar: wrap and stack */
  .toolbar { gap: 6px; margin-bottom: 12px; }
  .filter-btn { padding: 6px 12px; font-size: 11px; }
  .toolbar-sep { display: none; }
  .sort-select { font-size: 11px; }
  .toolbar-btn { padding: 6px 12px; font-size: 11px; }

  /* Lanes: single column cards */
  .lane-body { grid-template-columns: 1fr; gap: 6px; padding: 4px 8px 10px; }
  .lane-head { padding: 10px 12px; }
  .lane-title { font-size: 13px; }
  .lane-actions { opacity: 1; } /* always show on mobile - no hover */

  /* Cards: touch-friendly sizing */
  .card { padding: 14px; }
  .card-actions { opacity: 1; } /* always visible on mobile */
  .card-btn { width: 28px; height: 28px; font-size: 12px; }
  .card-title { font-size: 14px; }
  .card-desc { font-size: 12px; -webkit-line-clamp: 3; }
  .card-meta { gap: 5px; }
  .tag { font-size: 10px; padding: 3px 8px; }

  /* Modals: full-screen on mobile */
  .modal-overlay { align-items: flex-end; }
  .modal {
    width: 100%;
    max-width: 100vw;
    max-height: 92vh;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 16px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .modal-sm { width: 100%; }
  .modal h3 { font-size: 16px; }
  .field input, .field textarea, .field select { font-size: 16px; /* prevents iOS zoom */ padding: 10px 12px; }
  .field textarea { min-height: 80px; }
  .field-row { flex-direction: column; gap: 0; }
  .modal-actions { flex-wrap: wrap; }
  .modal-actions .toolbar-btn { flex: 1; min-width: 0; text-align: center; padding: 10px; }

  /* Timeline: full-screen panel */
  .timeline-panel {
    width: 100%;
    max-width: 100vw;
    border-radius: 0;
  }
  .timeline-header { padding: 14px 16px; }
  .timeline-content { padding: 12px; }
  .tl-row-label { min-width: 80px; font-size: 10px; }
  .tl-bar { height: 18px; font-size: 9px; min-width: 12px; }

  /* Voice indicator */
  .voice-indicator { bottom: 20px; left: 14px; right: 14px; border-radius: var(--radius-sm); }

  /* Toast: full width at bottom */
  .toast-container { left: 10px; right: 10px; bottom: 10px; }
  .toast { width: 100%; max-width: none; font-size: 13px; }

  /* Search: show as mobile search bar below topbar */
  .mobile-search { display: block; }
}

/* ── Responsive: Small phones (≤ 380px) ── */
@media (max-width: 380px) {
  .topbar { padding: 8px 10px; }
  .topbar-left .logo { font-size: 14px; }
  .icon-btn { width: 30px; height: 30px; }
  .main { padding: 10px 8px 80px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .stat-val { font-size: 16px; }
  .card { padding: 12px; }
  .card-title { font-size: 13px; }
  .project-tab { padding: 7px 10px; font-size: 10px; }
  .modal { padding: 16px 12px; }
}

/* ── Touch & safe areas ── */
@supports (padding: env(safe-area-inset-bottom)) {
  .main { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
  .quick-add-bar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}

/* ── Disable hover effects on touch devices ── */
@media (hover: none) and (pointer: coarse) {
  .card:hover { transform: none; background: var(--card-bg); border-color: var(--border); }
  .card-actions { opacity: 1; }
  .lane-actions { opacity: 1; }
  .lane-head:hover { background: transparent; }
  .project-tab .tab-actions { display: none !important; }
  /* Larger tap targets */
  .card-btn { width: 32px; height: 32px; }
  .lane-action-btn { width: 28px; height: 28px; }
  .icon-btn { width: 38px; height: 38px; }
  .filter-btn { padding: 8px 14px; }
  .toolbar-btn { padding: 8px 16px; }
  .tag-option { padding: 8px 14px; }
}

/* ── View switcher ── */
.view-switcher { display: flex; border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden; margin-right: 4px; }
.view-btn { width: 36px; height: 34px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--muted); cursor: pointer; transition: all var(--transition); }
.view-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.view-btn.active { background: var(--accent-muted); color: var(--accent); }

/* ── Meetings view ── */
.meetings-view { display: none; padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
.meetings-view.active { display: block; }

.meetings-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.meetings-toolbar .search-box { flex: 1; min-width: 180px; max-width: 320px; }

.meetings-stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.meetings-stat { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 13px; color: var(--text-secondary); }
.meetings-stat strong { color: var(--text); font-weight: 600; }

.meetings-empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.meetings-empty svg { margin-bottom: 16px; opacity: 0.4; }
.meetings-empty h3 { color: var(--text-secondary); margin-bottom: 8px; font-size: 16px; }
.meetings-empty p { font-size: 13px; }

.meetings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

.meeting-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; cursor: pointer; transition: all var(--transition); }
.meeting-card:hover { background: var(--card-bg-hover); border-color: var(--border-hover); transform: translateY(-1px); }
.meeting-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
.meeting-card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.meeting-card-date { font-size: 11px; color: var(--muted); font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; }
.meeting-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.meeting-card-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.meeting-status { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.meeting-status.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
.meeting-status.processing { background: rgba(59,130,246,0.15); color: var(--blue); }
.meeting-status.processed { background: rgba(34,197,94,0.15); color: var(--green); }
.meeting-status.failed { background: rgba(239,68,68,0.15); color: var(--red); }

/* ── Meeting modal ── */
.meeting-modal { max-width: 700px; width: 95vw; max-height: 90vh; overflow-y: auto; }
.meeting-modal .field { margin-bottom: 14px; }
.meeting-modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.meeting-modal input[type="text"],
.meeting-modal input[type="date"] { width: 100%; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 13px; font-family: var(--font); outline: none; transition: border-color var(--transition); }
.meeting-modal input:focus { border-color: var(--border-focus); }
.meeting-modal textarea { width: 100%; padding: 10px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-size: 12px; font-family: var(--font-mono); outline: none; resize: vertical; line-height: 1.6; transition: border-color var(--transition); }
.meeting-modal textarea:focus { border-color: var(--border-focus); }

.meeting-attendees { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-xs); min-height: 38px; align-items: center; }
.meeting-attendees .attendee-chip { display: flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--accent-muted); border: 1px solid var(--accent-border); border-radius: 12px; font-size: 12px; color: var(--accent); }
.meeting-attendees .attendee-chip .remove { cursor: pointer; opacity: 0.6; font-size: 14px; }
.meeting-attendees .attendee-chip .remove:hover { opacity: 1; }
.meeting-attendees input { flex: 1; min-width: 80px; background: transparent; border: none; color: var(--text); font-size: 12px; font-family: var(--font); outline: none; }

.meeting-modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 16px; }

/* ── Upload drop zone ── */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 24px; text-align: center; color: var(--muted); font-size: 13px; cursor: pointer; transition: all var(--transition); margin-bottom: 12px; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--accent-muted); color: var(--text); }
.upload-zone svg { margin-bottom: 8px; opacity: 0.5; }

/* ── Extraction panel ── */
.extraction-panel { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
.extraction-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.extraction-header h3 { font-size: 14px; font-weight: 600; }
.extraction-section { margin-bottom: 14px; }
.extraction-section h4 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.extraction-section ul { list-style: none; padding: 0; }
.extraction-section li { font-size: 13px; color: var(--text-secondary); padding: 4px 0; line-height: 1.5; }
.extraction-section li::before { content: "•"; color: var(--accent); margin-right: 8px; }
.extraction-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs); margin-bottom: 6px; transition: all var(--transition); }
.extraction-item:hover { border-color: var(--border-hover); }
.extraction-item input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
.extraction-item-body { flex: 1; min-width: 0; }
.extraction-item-title { font-size: 13px; font-weight: 500; color: var(--text); }
.extraction-item-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.extraction-item-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

.extraction-spinner { display: flex; align-items: center; gap: 10px; padding: 20px; color: var(--muted); font-size: 13px; justify-content: center; }
.extraction-spinner .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: dotPulse 1.2s ease infinite; }
.extraction-spinner .dot:nth-child(2) { animation-delay: 0.2s; }
.extraction-spinner .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

/* ── Card meeting badge ── */

}

  <!-- ── Toast ── -->
  <div class="toast-container" id="toast-container"></div>

  <script>
/* ═══════════════════════════════════════════════════════════
   Cortex — personal AI operating system
   ═══════════════════════════════════════════════════════════ */
(function () {
  'use strict';

  // ── Storage keys ──
  const STORAGE_KEY = 'backlog_projects';
  const ACTIVE_KEY  = 'backlog_active_project';
  const API_KEY_STORE = 'backlog_claude_api_key';
  const WORKSPACES_KEY = 'cortex_workspaces';
  const ACTIVE_WS_KEY = 'cortex_active_workspace';

  // ── State ──
  let workspaces   = []; // { id, name, emoji }
  let activeWsId   = 'all'; // 'all' or workspace id
  let projects     = [];
  let activeId     = null;
  let filters      = new Set();
  let searchQuery  = '';
  let sortBy       = 'manual';   // manual | priority | date | due | alpha
  let editingItem  = null;
  let dragState    = { itemId: null, sourceLaneId: null };

  // ── Voice state ──
  let mediaRecorder  = null;
  let audioChunks    = [];
  let isRecording    = false;
  let modalRecording = false;
  let modalAudioBlob = null;
  let modalTranscript = '';

  // ── Helpers ──
  const $ = id => document.getElementById(id);
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  const uid = () => 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
  const today = () => new Date().toISOString().split('T')[0];

  // ── Persistence (localStorage + backend sync) ──
  let _syncTimer = null;
  let _backendAvailable = null; // null = unknown, true/false after first probe

  function _getApiBase() {
    if (location.protocol === 'https:' || location.protocol === 'http:') {
      return location.origin;
    }
    return '';
  }

  async function _syncToBackend() {
    const base = _getApiBase();
    if (!base || _backendAvailable === false) return;
    try {
      const resp = await fetch(base + '/api/backlog', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(projects),
      });
      if (resp.ok) {
        _backendAvailable = true;
        _showSyncStatus('saved');
      } else {
        _backendAvailable = false;
        _showSyncStatus('error');
        console.debug('Backend sync disabled (status ' + resp.status + ')');
      }
    } catch (e) {
      _backendAvailable = false;
      _showSyncStatus('error');
      console.debug('Backend sync disabled:', e.message);
    }
  }

  // Periodically pull from backend to pick up API-side changes (moves, inbox items)
  function _startBackendPoll() {
    setInterval(async () => {
      if (!_backendAvailable) return;
      const changed = await _loadFromBackend();
      if (changed) render();
    }, 15000); // every 15s
  }

  function _showSyncStatus(state) {
    const el = $('sync-status');
    if (!el) return;
    if (state === 'saving') { el.textContent = 'syncing…'; el.className = 'sync-status saving'; }
    else if (state === 'saved') { el.textContent = '✓ saved'; el.className = 'sync-status saved'; setTimeout(() => { el.textContent = ''; }, 2000); }
    else if (state === 'error') { el.textContent = '✕ offline'; el.className = 'sync-status'; }
    else { el.textContent = ''; el.className = 'sync-status'; }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      localStorage.setItem(ACTIVE_KEY, activeId);
      localStorage.setItem(WORKSPACES_KEY, JSON.stringify(workspaces));
      localStorage.setItem(ACTIVE_WS_KEY, activeWsId);
    } catch (e) { console.warn('Save failed', e); }
    // Debounced backend sync (2s after last save)
    _showSyncStatus('saving');
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(_syncToBackend, 2000);
  }

  async function _loadFromBackend() {
    const base = _getApiBase();
    if (!base) return false;
    try {
      const resp = await fetch(base + '/api/backlog');
      if (!resp.ok) return false;
      const data = await resp.json();
      if (Array.isArray(data) && data.length > 0) {
        _backendAvailable = true;
        // Server is always the source of truth
        projects = data;
        activeId = localStorage.getItem(ACTIVE_KEY) || projects[0]?.id;
        if (!projects.find(p => p.id === activeId)) activeId = projects[0]?.id;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        localStorage.setItem(ACTIVE_KEY, activeId);
        return true;
      }
    } catch (e) {
      console.debug('Backend load failed, using localStorage:', e.message);
    }
    return false;
  }

  function load() {
    // Load workspaces
    try {
      const wsRaw = localStorage.getItem(WORKSPACES_KEY);
      if (wsRaw) workspaces = JSON.parse(wsRaw) || [];
      activeWsId = localStorage.getItem(ACTIVE_WS_KEY) || 'all';
    } catch (e) { workspaces = []; }

    // Seed default workspaces if empty
    if (!workspaces.length) {
      workspaces = [
        { id: 'ws_personal', name: 'Personal', emoji: '🏠' },
        { id: 'ws_work', name: 'Work', emoji: '💼' },
      ];
    }

    // Load from localStorage first (instant), then backend overrides
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        projects = JSON.parse(raw);
        activeId = localStorage.getItem(ACTIVE_KEY) || (projects[0] && projects[0].id);
      }
    } catch (e) { projects = []; }

    if (!projects.length) {
      seedDefault();
    }
    if (!activeId || !projects.find(p => p.id === activeId)) {
      activeId = projects[0].id;
    }

    // Backend always wins — load and re-render
    _loadFromBackend().then(loaded => {
      if (loaded) render();
    });
  }

  function getProject() { return projects.find(p => p.id === activeId); }

  // ── Toast ──
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    $('toast-container').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2800);
  }

  // ── Default project (first-run seed) ──
  function seedDefault() {
    const today = new Date().toISOString().slice(0, 10);
    projects = [{
      id: uid(),
      name: 'My Project',
      types: ['eng', 'product', 'biz'],
      typeLabels: { eng: 'Engineering', product: 'Product', biz: 'Business' },
      lanes: [
        {
          id: 'backlog', title: 'Backlog', collapsed: false,
          items: [
            { id: uid(), title: 'Welcome to Cortex!', desc: 'Use Quick Add above to type or voice-dictate items. AI will auto-classify priority, type, and lane.', priority: 'p2', type: 'product', created: today, due: '', tags: ['getting-started'], voiceNote: null },
          ]
        },
        {
          id: 'in-progress', title: 'In progress', collapsed: false,
          items: []
        },
        {
          id: 'review', title: 'Review', collapsed: false,
          items: []
        },
        {
          id: 'done', title: 'Done', collapsed: true,
          items: []
        }
      ]
    }];
    activeId = projects[0].id;
    save();
  }

  // ── Data helpers ──
  function allItems(proj) {
    const p = proj || getProject();
    if (!p) return [];
    const items = [];
    p.lanes.forEach(l => l.items.forEach(i => items.push({ ...i, laneId: l.id, laneTitle: l.title })));
    return items;
  }

  function findItem(id, proj) {
    const p = proj || getProject();
    for (const l of p.lanes) { const it = l.items.find(x => x.id === id); if (it) return it; }
    return null;
  }

  function findLaneOfItem(id, proj) {
    const p = proj || getProject();
    for (const l of p.lanes) { if (l.items.some(x => x.id === id)) return l.id; }
    return null;
  }

  function getStats() {
    const p = getProject();
    if (!p) return { total: 0, p1: 0, p2: 0, p3: 0, done: 0, open: 0, overdue: 0 };
    let total = 0, p1 = 0, p2 = 0, p3 = 0, done = 0, overdue = 0;
    const now = today();
    p.lanes.forEach(l => l.items.forEach(i => {
      total++;
      if (i.priority === 'p1') p1++;
      if (i.priority === 'p2') p2++;
      if (i.priority === 'p3') p3++;
      if (i.priority === 'done') done++;
      if (i.due && i.due < now && i.priority !== 'done') overdue++;
    }));
    return { total, p1, p2, p3, done, open: total - done, overdue };
  }

  function itemVisible(item) {
    // Search filter
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const matchTitle = item.title.toLowerCase().includes(q);
      const matchDesc = item.desc.toLowerCase().includes(q);
      const matchTags = (item.tags || []).some(t => t.toLowerCase().includes(q));
      if (!matchTitle && !matchDesc && !matchTags) return false;
    }
    // Tag/priority/type filters
    if (filters.size === 0) return true;
    for (const f of filters) {
      if (item.priority === f || item.type === f) return true;
      if ((item.tags || []).includes(f)) return true;
    }
    return false;
  }

  function sortItems(items) {
    if (sortBy === 'manual') return items;
    const copy = [...items];
    const prioOrder = { p1: 0, p2: 1, p3: 2, done: 3 };
    switch (sortBy) {
      case 'priority': copy.sort((a, b) => (prioOrder[a.priority] || 9) - (prioOrder[b.priority] || 9)); break;
      case 'date':     copy.sort((a, b) => (b.created || '').localeCompare(a.created || '')); break;
      case 'due':      copy.sort((a, b) => { if (!a.due) return 1; if (!b.due) return -1; return a.due.localeCompare(b.due); }); break;
      case 'alpha':    copy.sort((a, b) => a.title.localeCompare(b.title)); break;
    }
    return copy;
  }

  function getAllTags() {
    const p = getProject();
    if (!p) return [];
    const tagSet = new Set();
    p.lanes.forEach(l => l.items.forEach(i => (i.tags || []).forEach(t => tagSet.add(t))));
    return [...tagSet].sort();
  }

  function getDueStatus(due) {
    if (!due) return '';
    const now = new Date(); now.setHours(0,0,0,0);
    const d = new Date(due + 'T00:00:00');
    const diff = Math.ceil((d - now) / 86400000);
    if (diff < 0) return 'overdue';
    if (diff <= 3) return 'soon';
    return '';
  }

  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  // ═════════════════════════════════════════════════════
  //  RENDER
  // ═════════════════════════════════════════════════════

  // ── Workspaces ──

  function getVisibleProjects() {
    if (activeWsId === 'all') return projects;
    if (activeWsId === 'uncategorized') return projects.filter(p => !p.workspaceId || !workspaces.some(w => w.id === p.workspaceId));
    return projects.filter(p => p.workspaceId === activeWsId);
  }

  function renderWorkspaceTabs() {
    const container = $('workspace-tabs');
    const allCount = projects.length;
    let html = `<button class="workspace-tab${activeWsId === 'all' ? ' active' : ''}" data-ws="all">
      All <span class="ws-count">${allCount}</span>
    </button>`;
    workspaces.forEach(ws => {
      const count = projects.filter(p => p.workspaceId === ws.id).length;
      html += `<button class="workspace-tab${activeWsId === ws.id ? ' active' : ''}" data-ws="${ws.id}">
        ${ws.emoji || ''} ${esc(ws.name)} <span class="ws-count">${count}</span>
      </button>`;
    });
    // Unassigned
    const unassigned = projects.filter(p => !p.workspaceId || !workspaces.some(w => w.id === p.workspaceId)).length;
    if (unassigned && workspaces.length) {
      html += `<button class="workspace-tab${activeWsId === 'uncategorized' ? ' active' : ''}" data-ws="uncategorized">
        Uncategorized <span class="ws-count">${unassigned}</span>
      </button>`;
    }
    container.innerHTML = html;

    container.querySelectorAll('.workspace-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeWsId = tab.dataset.ws;
        // If active project is not in this workspace, switch to first visible
        const visible = getVisibleProjects();
        if (visible.length && !visible.find(p => p.id === activeId)) {
          activeId = visible[0].id;
        }
        save();
        render();
      });
      tab.addEventListener('contextmenu', e => {
        e.preventDefault();
        if (tab.dataset.ws === 'all' || tab.dataset.ws === 'uncategorized') return;
        const ws = workspaces.find(w => w.id === tab.dataset.ws);
        if (ws) openWorkspaceModal(ws);
      });
    });

    $('btn-add-workspace').onclick = () => openWorkspaceModal(null);
  }

  function openWorkspaceModal(ws) {
    const isEdit = !!ws;
    const name = prompt(isEdit ? `Rename workspace "${ws.name}":` : 'New workspace name:', isEdit ? ws.name : '');
    if (!name || !name.trim()) return;
    const emoji = prompt('Emoji (optional):', isEdit ? (ws.emoji || '') : '📁') || '';

    if (isEdit) {
      ws.name = name.trim();
      ws.emoji = emoji.trim();
    } else {
      workspaces.push({ id: 'ws_' + Date.now().toString(36), name: name.trim(), emoji: emoji.trim() });
    }
    save();
    render();
    toast(isEdit ? 'Workspace updated' : 'Workspace created', 'success');
  }

  function render() {
    renderWorkspaceTabs();
    renderProjectTabs();
    renderStats();
    renderToolbar();
    renderLanes();
  }

  // ── Project tabs ──
  function renderProjectTabs() {
    const container = $('project-tabs');
    const visible = getVisibleProjects();
    container.innerHTML = visible.map(p => {
      const count = p.lanes.reduce((s, l) => s + l.items.filter(i => i.priority !== 'done').length, 0);
      const isActive = p.id === activeId;
      return `<button class="project-tab${isActive ? ' active' : ''}" data-id="${p.id}">
        ${esc(p.name)}
        <span class="tab-count">${count}</span>
        <span class="tab-actions">
          <span class="tab-action-btn" data-action="edit-project" data-id="${p.id}" title="Rename">✎</span>
          ${projects.length > 1 ? `<span class="tab-action-btn delete" data-action="delete-project" data-id="${p.id}" title="Delete">✕</span>` : ''}
        </span>
      </button>`;
    }).join('');

    container.querySelectorAll('.project-tab').forEach(tab => {
      tab.addEventListener('click', e => {
        if (e.target.closest('.tab-action-btn')) return;

  // ── Lanes ──

      return;
    }

    container.innerHTML = '';
    p.lanes.forEach(lane => {
      const vis = sortItems(lane.items.filter(itemVisible));

      div.className = 'lane' + (isDone ? ' lane-done' : '');

      div.innerHTML =

    // Bind lane heads
    container.querySelectorAll('.lane-head').forEach(head => {
      head.addEventListener('click', e => {
        if (e.target.closest('.lane-action-btn')) return;
        const lane = p.lanes.find(l => l.id === head.dataset.lane);
        if (lane) { lane.collapsed = !lane.collapsed; save(); renderLanes(); }

    // Bind lane actions

      btn.addEventListener('click', e => {
        e.stopPropagation();

      card.addEventListener('click', e => {

    container.querySelectorAll('.card-btn').forEach(btn => {
      btn.addEventListener('click', e => {

        if (action === 'edit') openItemModal(findItem(id));
        else if (action === 'archive') archiveItem(id);
        else if (action === 'reopen') reopenItem(id);
        else if (action === 'delete') deleteItem(id);
      });

    // Bind voice badges
    container.querySelectorAll('.card-voice-badge').forEach(badge => {
      badge.addEventListener('click', e => {
        e.stopPropagation();

        if (item && item.voiceNote) playVoiceNote(item.voiceNote);

        navigateToMeeting(badge.dataset.meetingId);

  // ── Drag & drop ──
  function setupDragDrop() {
    const cards = document.querySelectorAll('.card[draggable]');
    const laneBodies = document.querySelectorAll('.lane-body');

    cards.forEach(card => {
      card.addEventListener('dragstart', e => {
        dragState.itemId = card.dataset.id;
        dragState.sourceLaneId = card.closest('.lane').dataset.laneId;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', card.dataset.id);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragState = { itemId: null, sourceLaneId: null };
      });
    });

    // Allow drop on cards (reorder within/across lanes)
    cards.forEach(card => {
      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        card.classList.add('drag-target');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-target');
        const targetId = card.dataset.id;
        if (!dragState.itemId || dragState.itemId === targetId) return;
        moveItem(dragState.itemId, dragState.sourceLaneId, card.closest('.lane').dataset.laneId, targetId);
      });
    });

    // Allow drop on lane bodies (drop at end of lane)
    laneBodies.forEach(lb => {
      lb.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        lb.closest('.lane').classList.add('drag-over');
      });
      lb.addEventListener('dragleave', e => {
        if (!lb.contains(e.relatedTarget)) lb.closest('.lane').classList.remove('drag-over');
      });
      lb.addEventListener('drop', e => {
        e.preventDefault();
        lb.closest('.lane').classList.remove('drag-over');
        if (e.target.closest('.card')) return; // handled by card drop
        const targetLaneId = lb.dataset.laneBody;
        if (!dragState.itemId) return;
        moveItem(dragState.itemId, dragState.sourceLaneId, targetLaneId, null);
      });
    });
  }

  function moveItem(itemId, srcLaneId, dstLaneId, beforeItemId) {
    const p = getProject();
    const srcLane = p.lanes.find(l => l.id === srcLaneId);
    const dstLane = p.lanes.find(l => l.id === dstLaneId);
    if (!srcLane || !dstLane) return;

    const si = srcLane.items.findIndex(i => i.id === itemId);
    if (si < 0) return;
    const [moved] = srcLane.items.splice(si, 1);

    // If moving to done lane, update status
    if (dstLane.id === 'done' && moved.priority !== 'done') {
      moved.priority = 'done';
      moved.type = 'done';
    }
    // If moving out of done lane, restore
    if (srcLane.id === 'done' && dstLane.id !== 'done' && moved.priority === 'done') {
      moved.priority = 'p2';
      moved.type = p.types ? p.types[0] : 'eng';
    }

    if (beforeItemId) {
      const di = dstLane.items.findIndex(i => i.id === beforeItemId);
      dstLane.items.splice(di, 0, moved);
    } else {
      dstLane.items.push(moved);
    }

    save();
    render();
  }

  // ── Touch drag & drop for mobile ──
  function setupTouchDragDrop() {
    if (!('ontouchstart' in window)) return; // desktop only uses native DnD

    let touchDrag = null; // { card, clone, itemId, sourceLaneId, startX, startY }
    const HOLD_MS = 300;
    let holdTimer = null;

    document.addEventListener('touchstart', e => {
      const card = e.target.closest('.card[draggable]');
      if (!card) return;
      const touch = e.touches[0];
      holdTimer = setTimeout(() => {
        // Start drag
        const rect = card.getBoundingClientRect();
        const clone = card.cloneNode(true);
        clone.classList.add('touch-drag-clone');
        clone.style.cssText = `
          position:fixed; z-index:9999; width:${rect.width}px;
          pointer-events:none; opacity:0.85; transform:rotate(2deg);
          box-shadow: 0 8px 32px rgba(0,0,0,0.5);
          left:${rect.left}px; top:${rect.top}px;
        `;
        document.body.appendChild(clone);
        card.classList.add('dragging');

        touchDrag = {
          card, clone,
          itemId: card.dataset.id,
          sourceLaneId: card.closest('.lane').dataset.laneId,
          offsetX: touch.clientX - rect.left,
          offsetY: touch.clientY - rect.top,
        };
        navigator.vibrate && navigator.vibrate(30);
      }, HOLD_MS);
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (holdTimer && !touchDrag) { clearTimeout(holdTimer); holdTimer = null; return; }
      if (!touchDrag) return;
      e.preventDefault();
      const touch = e.touches[0];
      touchDrag.clone.style.left = (touch.clientX - touchDrag.offsetX) + 'px';
      touchDrag.clone.style.top = (touch.clientY - touchDrag.offsetY) + 'px';

      // Highlight drop target
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      const elem = document.elementFromPoint(touch.clientX, touch.clientY);
      if (elem) {
        const lane = elem.closest('.lane');
        if (lane) lane.classList.add('drag-over');
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      clearTimeout(holdTimer); holdTimer = null;
      if (!touchDrag) return;

      const touch = e.changedTouches[0];
      touchDrag.clone.remove();
      touchDrag.card.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

      // Find drop target
      const elem = document.elementFromPoint(touch.clientX, touch.clientY);
      if (elem) {
        const targetCard = elem.closest('.card[draggable]');
        const targetLane = elem.closest('.lane');

        if (targetCard && targetCard.dataset.id !== touchDrag.itemId) {
          moveItem(touchDrag.itemId, touchDrag.sourceLaneId, targetLane.dataset.laneId, targetCard.dataset.id);
        } else if (targetLane) {
          moveItem(touchDrag.itemId, touchDrag.sourceLaneId, targetLane.dataset.laneId, null);
        }
      }
      touchDrag = null;
    }, { passive: true });
  }

      document.querySelector('.topbar-right').prepend(searchToggle);

  // ═════════════════════════════════════════════════════
  //  ITEM CRUD
  // ═════════════════════════════════════════════════════

  function archiveItem(id) {
    const p = getProject();
    let doneLane = p.lanes.find(l => l.id === 'done');
    if (!doneLane) {
      doneLane = { id: 'done', title: 'Done', collapsed: true, items: [] };
      p.lanes.push(doneLane);
    }
    const laneId = findLaneOfItem(id);
    const lane = p.lanes.find(l => l.id === laneId);
    const item = lane.items.find(i => i.id === id);
    lane.items = lane.items.filter(i => i.id !== id);
    item.priority = 'done'; item.type = 'done';
    doneLane.items.unshift(item);
    save(); render();
    toast('Marked as done');
  }

  function reopenItem(id) {
    const p = getProject();
    const doneLane = p.lanes.find(l => l.id === 'done');
    if (!doneLane) return;
    const item = doneLane.items.find(i => i.id === id);
    if (!item) return;
    doneLane.items = doneLane.items.filter(i => i.id !== id);
    item.priority = 'p2';
    item.type = p.types ? p.types[0] : 'eng';
    p.lanes[0].items.push(item);
    save(); render();
    toast('Reopened');
  }

  function deleteItem(id) {
    if (!confirm('Delete this item permanently?')) return;
    const p = getProject();
    p.lanes.forEach(l => { l.items = l.items.filter(i => i.id !== id); });
    save(); render();
    toast('Item deleted', 'error');
  }

  function setupTagsInput() {
    const container = $('m-tags-container');
    const input = $('m-tags-input');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) {
        e.preventDefault();
        addTagChip(input.value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, ''));
        input.value = '';
      }
      if (e.key === 'Backspace' && !input.value) {
        const chips = container.querySelectorAll('.tag-chip');
        if (chips.length) chips[chips.length - 1].remove();
      }
    });

    container.addEventListener('click', e => {
      if (e.target.classList.contains('remove')) {
        e.target.closest('.tag-chip').remove();
      } else {
        input.focus();
      }
    });
  }

  function addTagChip(tag) {
    if (!tag) return;
    const container = $('m-tags-container');
    const input = $('m-tags-input');
    // Check for duplicates
    const existing = [...container.querySelectorAll('.tag-chip')].map(c => c.textContent.replace('×', '').trim());
    if (existing.includes(tag)) return;
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${esc(tag)}<span class="remove" data-tag="${esc(tag)}">&times;</span>`;
    container.insertBefore(chip, input);
  }

  function getModalTags() {
    const container = $('m-tags-container');
    return [...container.querySelectorAll('.tag-chip')].map(c => c.textContent.replace('×', '').trim()).filter(Boolean);
  }

  function getSelVal(containerId) {
    const s = $(containerId).querySelector('.sel');
    return s ? s.dataset.val : null;
  }

  function closeItemModal() {
    $('item-modal-overlay').classList.remove('open');
    editingItem = null;
    if (modalRecording) stopModalVoice();
    modalAudioBlob = null;
    modalTranscript = '';
  }

  function saveItemModal() {
    const title = $('m-title').value.trim();
    if (!title) { $('m-title').focus(); return; }
    const desc = $('m-desc').value.trim();
    const laneId = $('m-lane').value;
    const due = $('m-due').value || '';
    const priority = getSelVal('m-priority') || 'p2';
    const type = getSelVal('m-type') || 'eng';
    const tags = getModalTags();
    const p = getProject();

    // Convert audio blob to data URL for persistence
    let voiceNote = modalAudioBlob;
    let voiceTranscript = modalTranscript;

    const finishSave = (vn) => {
      if (editingItem) {
        editingItem.title = title;
        editingItem.desc = desc;
        editingItem.priority = priority;
        editingItem.type = type;
        editingItem.due = due;
        editingItem.tags = tags;
        if (vn !== undefined) editingItem.voiceNote = vn;
        if (voiceTranscript) editingItem.voiceTranscript = voiceTranscript;
        const curLane = findLaneOfItem(editingItem.id);
        if (curLane !== laneId) {
          p.lanes.find(l => l.id === curLane).items = p.lanes.find(l => l.id === curLane).items.filter(i => i.id !== editingItem.id);
          p.lanes.find(l => l.id === laneId).items.push(editingItem);
        }
      } else {
        const newItem = { id: uid(), title, desc, priority, type, created: today(), due, tags, voiceNote: vn || null, voiceTranscript: voiceTranscript || '' };
        const lane = p.lanes.find(l => l.id === laneId);
        if (lane) lane.items.push(newItem);
      }
      save();
      closeItemModal();
      render();
      toast(editingItem ? 'Item updated' : 'Item added', 'success');
    };

    // If we have a new blob, convert to data URL
    if (voiceNote && voiceNote instanceof Blob) {
      const reader = new FileReader();
      reader.onloadend = () => finishSave(reader.result);
      reader.readAsDataURL(voiceNote);
    } else {
      finishSave(voiceNote);
    }
  }

  async function toggleModalVoice() {
    if (modalRecording) {
      stopModalVoice();
    } else {
      startModalVoice();
    }
  }

  async function startModalVoice() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        modalAudioBlob = blob;
        stream.getTracks().forEach(t => t.stop());

        // Show audio player in modal
        const section = $('m-voice-section');
        let audio = $('m-voice-audio');
        if (!audio) {
          audio = document.createElement('audio');
          audio.className = 'voice-audio';
          audio.id = 'm-voice-audio';
          audio.controls = true;
          section.appendChild(audio);
        }
        audio.src = URL.createObjectURL(blob);

        // Try speech-to-text
        transcribeAudio();
      };
      mediaRecorder.start();
      modalRecording = true;
      $('m-voice-btn').innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Stop';
      $('m-voice-btn').classList.add('recording');
    } catch (err) {
      toast('Microphone access denied', 'error');
    }
  }

  function stopModalVoice() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    modalRecording = false;
    $('m-voice-btn').innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg> Record';
    $('m-voice-btn').classList.remove('recording');
  }

  function transcribeAudio() {
    // Use Web Speech API for live transcription approach
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
    // Note: Web Speech API works for live capture. For recorded audio we show a note.
    const section = $('m-voice-section');
    let transcript = section.querySelector('.voice-transcription');
    if (!transcript) {
      transcript = document.createElement('div');
      transcript.className = 'voice-transcription';
      transcript.id = 'm-voice-transcript';
      section.appendChild(transcript);
    }
    transcript.textContent = 'Voice note attached. Play back using the audio player above.';
  }

  // Quick voice note from toolbar
  async function startQuickVoice() {
    if (isRecording) { stopQuickVoice(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        $('voice-indicator').classList.remove('active');
        isRecording = false;

        // Open a new item modal with the recording attached
        modalAudioBlob = blob;
        openItemModal();
      };
      mediaRecorder.start();
      isRecording = true;
      $('voice-indicator').classList.add('active');
      $('voice-stop').onclick = stopQuickVoice;

      // Also use speech recognition for live transcription
      startLiveTranscription();
    } catch (err) {
      toast('Microphone access denied', 'error');
    }
  }

  function stopQuickVoice() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    stopLiveTranscription();
  }

  // Live speech recognition
  let speechRecognition = null;

  function startLiveTranscription() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    speechRecognition = new SpeechRecognition();
    speechRecognition.continuous = true;
    speechRecognition.interimResults = true;
    speechRecognition.lang = 'en-US';
    let finalTranscript = '';
    speechRecognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      modalTranscript = finalTranscript.trim();
    };
    speechRecognition.onerror = () => {};
    speechRecognition.start();
  }

  function stopLiveTranscription() {
    if (speechRecognition) {
      try { speechRecognition.stop(); } catch (e) {}
      speechRecognition = null;
    }
  }

  function playVoiceNote(dataUrl) {
    const audio = new Audio(dataUrl);
    audio.play();
  }

  function exportProject() {

    const blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `cortex_${p.name.toLowerCase().replace(/\s+/g, '_')}_${today()}.json`;

  function importProject() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.lanes) {
            // Ensure items have new fields
            data.lanes.forEach(l => l.items.forEach(i => {
              if (!i.tags) i.tags = [];
              if (!i.due) i.due = '';
              if (!i.voiceNote) i.voiceNote = null;
            }));
            // If it looks like a single project
            if (!data.id) data.id = uid();
            if (!data.name) data.name = file.name.replace('.json', '');
            if (!data.types) data.types = ['eng', 'product', 'biz'];
            if (!data.typeLabels) data.typeLabels = { eng: 'Engineering', product: 'Product', biz: 'Business' };
            projects.push(data);
            activeId = data.id;
            save(); render();
            toast('Imported: ' + data.name, 'success');
          }
        } catch (err) { toast('Invalid file', 'error'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ═════════════════════════════════════════════════════

  // ═════════════════════════════════════════════════════

  function openTimeline() {
    const overlay = $('timeline-overlay');
    const panel = $('timeline-panel');
    const p = getProject();

    // Gather items with due dates
    const items = allItems(p).filter(i => i.due && i.priority !== 'done');
    items.sort((a, b) => a.due.localeCompare(b.due));

    if (!items.length) {
      panel.innerHTML = `<h3>Timeline <button class="icon-btn" id="tl-close" style="float:right">&#10005;</button></h3>
        <div class="timeline-empty">No items with due dates. Add due dates to see them on the timeline.</div>`;
      overlay.classList.add('open');
      $('tl-close').addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
      return;
    }

    // Determine date range
    const now = new Date();
    const earliest = new Date(Math.min(now.getTime(), new Date(items[0].due + 'T00:00:00').getTime()) - 7 * 86400000);
    const latest = new Date(items[items.length - 1].due + 'T00:00:00');
    latest.setDate(latest.getDate() + 14);
    const totalDays = Math.ceil((latest - earliest) / 86400000);
    const todayOffset = Math.ceil((now - earliest) / 86400000);

    // Build weeks header
    const weeks = [];
    const d = new Date(earliest);
    while (d <= latest) {
      weeks.push(new Date(d));
      d.setDate(d.getDate() + 7);
    }

    const rows = items.map(item => {
      const created = item.created ? new Date(item.created + 'T00:00:00') : earliest;
      const due = new Date(item.due + 'T00:00:00');
      const startPct = Math.max(0, (created - earliest) / (latest - earliest) * 100);
      const endPct = Math.min(100, (due - earliest) / (latest - earliest) * 100);
      const width = Math.max(1, endPct - startPct);
      return `<div class="timeline-row">
        <div class="timeline-item-label" title="${esc(item.title)}">${esc(item.title)}</div>
        <div class="timeline-bar-container">
          <div class="timeline-bar ${item.priority}" style="left:${startPct}%;width:${width}%">${formatDate(item.due)}</div>
        </div>
      </div>`;
    }).join('');

    const todayPct = (todayOffset / totalDays) * 100;

    panel.innerHTML =
      `<h3>Timeline — ${esc(p.name)} <button class="icon-btn" id="tl-close">&#10005;</button></h3>
      <div style="position:relative">
        <div class="timeline-header" style="margin-left:232px;display:flex;gap:0">
          ${weeks.map(w => `<div style="flex:1;text-align:center;padding:4px">${w.toLocaleDateString('en-GB', { day:'numeric', month:'short' })}</div>`).join('')}
        </div>
        <div style="position:relative">
          <div class="timeline-today" style="left:calc(232px + ${todayPct}%)"></div>
          ${rows}
        </div>
      </div>`;

    overlay.classList.add('open');
    $('tl-close').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  }

  document.addEventListener('keydown', e => {

      document.querySelectorAll('.modal-overlay.open').forEach(o => o.classList.remove('open'));
      if (isRecording) stopQuickVoice();
      return;
    }
    // Don't trigger shortcuts in inputs
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
      // Cmd+K in search
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('global-search').focus(); }
      return;
    }
    // Cmd+K — focus search
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('global-search').focus(); return; }
    // N — new item
    if (e.key === 'n') { e.preventDefault(); openItemModal(); return; }
    // T — timeline
    if (e.key === 't') { e.preventDefault(); openTimeline(); return; }
    // V — voice

    'ai': ['ai', 'artificial intelligence', 'llm', 'gpt', 'claude', 'agent', 'agentic', 'prompt'],
    'mobile': ['mobile', 'ios', 'android', 'app', 'responsive', 'pwa'],
    'security': ['security', 'auth', 'authentication', 'encryption', 'vulnerability', 'penetration', 'ssl', 'oauth'],
    'data': ['database', 'data', 'migration', 'schema', 'sql', 'nosql', 'analytics', 'etl'],
    'devops': ['deploy', 'ci', 'cd', 'docker', 'kubernetes', 'infra', 'monitoring', 'pipeline'],
    'ux': ['ux', 'ui', 'design', 'usability', 'accessibility', 'wireframe'],
    'payments': ['payment', 'stripe', 'billing', 'subscription', 'invoice', 'checkout'],
    'legal': ['legal', 'compliance', 'gdpr', 'privacy', 'terms', 'contract', 'regulation'],

    'testing': ['test', 'testing', 'qa', 'unit test', 'integration test', 'e2e', 'coverage'],
