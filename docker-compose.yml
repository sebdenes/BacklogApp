services:
  backlog:
    build: .
    container_name: backlog-app
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - backlog-data:/data
    environment:
      - DATA_DIR=/data
      - BACKLOG_API_KEY=${BACKLOG_API_KEY:-}
      - BACKLOG_WEBHOOK_SECRET=${BACKLOG_WEBHOOK_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
      - APP_VERSION=${APP_VERSION:-dev}
    restart: unless-stopped

  cortex-bot:
    build: ./bot
    container_name: cortex-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - CORTEX_API_URL=http://backlog:8000
      - BACKLOG_API_KEY=${BACKLOG_API_KEY:-}
      - BACKLOG_WEBHOOK_SECRET=${BACKLOG_WEBHOOK_SECRET:-}
    depends_on:
      - backlog
    restart: unless-stopped

volumes:
  backlog-data:
