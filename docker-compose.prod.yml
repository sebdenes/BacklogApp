services:
  backlog:
    image: ghcr.io/sebdenes/backlogapp:latest
    container_name: backlog-app
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - backlog-data:/data
      - claude-config:/root/.claude
    environment:
      - DATA_DIR=/data
      - BACKLOG_API_KEY=${BACKLOG_API_KEY:-}
      - BACKLOG_WEBHOOK_SECRET=${BACKLOG_WEBHOOK_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://cortex.athlai.me}
      - APP_VERSION=${APP_VERSION:-latest}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
    restart: unless-stopped

  cortex-bot:
    image: ghcr.io/sebdenes/backlogapp-bot:latest
    container_name: cortex-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - CORTEX_API_URL=http://backlog:8000
      - BACKLOG_API_KEY=${BACKLOG_API_KEY:-}
      - BACKLOG_WEBHOOK_SECRET=${BACKLOG_WEBHOOK_SECRET:-}
    depends_on:
      - backlog
    restart: unless-stopped

volumes:
  backlog-data:
  claude-config:
