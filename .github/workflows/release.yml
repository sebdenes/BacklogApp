name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sebdenes/backlogapp:${{ steps.version.outputs.version }}
            ghcr.io/sebdenes/backlogapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: /opt/backlog-app
          overwrite: true

      - name: Deploy with auto-rollback
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/backlog-app

            # Load env vars
            [ -f .env ] && set -a && . .env && set +a

            # Auth with ghcr.io
            echo "$GHCR_TOKEN" | docker login ghcr.io -u sebdenes --password-stdin

            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            # Save current image for rollback
            CONTAINER_ID=$($COMPOSE ps -q backlog 2>/dev/null || echo "")
            PREVIOUS=""
            if [ -n "$CONTAINER_ID" ]; then
              PREVIOUS=$(docker inspect --format='{{index .Config.Image}}' "$CONTAINER_ID" 2>/dev/null || echo "")
            fi
            echo "Previous image: ${PREVIOUS:-none (first deploy)}"

            # Pull + deploy
            $COMPOSE pull backlog
            $COMPOSE up -d --force-recreate

            # Health check (5 attempts, 5s apart)
            HEALTHY=false
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:${PORT:-8000}/api/health | grep -q '"ok"'; then
                HEALTHY=true
                echo "Deploy successful"
                break
              fi
              echo "Health check attempt $i/5 failed, waiting 5s..."
              sleep 5
            done

            # Auto-rollback on failure
            if [ "$HEALTHY" = "false" ]; then
              echo "Health check failed after 5 attempts"
              if [ -n "$PREVIOUS" ] && [ "$PREVIOUS" != "ghcr.io/sebdenes/backlogapp:latest" ]; then
                echo "Rolling back to $PREVIOUS..."
                docker pull "$PREVIOUS"
                docker tag "$PREVIOUS" ghcr.io/sebdenes/backlogapp:latest
                $COMPOSE up -d --force-recreate
                sleep 10
                if curl -sf http://localhost:${PORT:-8000}/api/health >/dev/null 2>&1; then
                  echo "Rollback successful"
                else
                  echo "CRITICAL: Rollback also failed"
                fi
              fi
              exit 1
            fi
